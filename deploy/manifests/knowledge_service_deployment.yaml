# deploy/manifests/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: knowledge-service
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: knowledge-service
  template:
    metadata:
      labels:
        app: knowledge-service
    spec:
      containers:
        - name: knowledge-service
          image: 003729975368.dkr.ecr.us-west-2.amazonaws.com/production-ai-platform/knowledge-service:b2d07d033a6cc90ed07477ffcc68b7ae1ec75b09
          ports:
            - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: knowledge-service
  namespace: dev
spec:
  selector:
    app: knowledge-service
  ports:
    - port: 8000
      targetPort: 8000
