# Workflow name
name: CI build and push

on:
  push:
    branches:
      - main

# Environment variables:
env:
  # The aws region:
  AWS_REGION: us-west-2
  # The repo name
  AWS_REPO_NAME: production-ai-platform/knowledge-service
  # The role arn for the CI deploy role that GHA will assume.
  CI_DEPLOY_ROLE_ARN: "arn:aws:iam::003729975368:role/production-ai-platform-ci-deploy"
  # Image tag
  TAG: ${{ github.sha }}

# Startting with no permissions and only scope what is needed for each job.
permissions: {}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          role-to-assume: ${{ env.CI_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr # This is a step ID that allows me to reference the output of this step later
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64 # v2.1.6

      # Using dockers newer container image builder, buildx. Faster and more efficient.
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      - name: Build and Push Image
        # This action is used with buildx to build and push docker images.
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: . # Specifying the root directory for the build.
          file: ./placeholder/Dockerfile # specifying the path to the Dockerfile to use for the build.
          push: true # push the image tot he registry after building.
          tags:  |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.AWS_REPO_NAME }}:${{ env.TAG }}
